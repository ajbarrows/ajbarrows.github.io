[manifest]
path = "publications.yaml"

[bib]
output = "cv_resume/cv/bibliography.bib"
my_last_name = "Barrows"

[cv]
tex = "cv_resume/cv/ajb_cv.tex"
figures_dir = "figures"
build_cmd = "pdflatex -interaction=nonstopmode ajb_cv.tex && bibtex ajb_cv && pdflatex -interaction=nonstopmode ajb_cv.tex && pdflatex -interaction=nonstopmode ajb_cv.tex"

[cv.section_map]
peer-reviewed = "Publications"
invited-talk = "Invited Talks"
selected-talk = "Selected Talks"
conference = "Abstracts"

# Website reads publications.yaml directly at build time via
# ajbarrows.github.io/src/utils/getPublications.ts — no generator needed.
